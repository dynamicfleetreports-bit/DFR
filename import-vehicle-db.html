<style>
  body { font-family: Outfit, sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 2rem; box-sizing: border-box; }
  .card { background: #1e293b; border-radius: 1rem; padding: 2rem; max-width: 520px; width: 100%; text-align: center; }
  h1 { font-size: 1.3rem; font-weight: 900; margin-bottom: 0.5rem; }
  p { font-size: 13px; color: #94a3b8; margin-bottom: 1.5rem; line-height: 1.6; }
  button { background: #2563eb; color: white; border: none; border-radius: 0.5rem; padding: 0.75rem 2rem; font-size: 14px; font-weight: 900; cursor: pointer; width: 100%; margin-bottom: 0.75rem; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.green { background: #059669; }
  .status { font-size: 13px; font-weight: 700; margin-top: 1rem; min-height: 1.5rem; }
  .ok { color: #10b981; } .err { color: #ef4444; }
  .stats { background: #0f172a; border-radius: 0.5rem; padding: 1rem; margin-top: 1rem; font-size: 12px; color: #64748b; text-align: left; }
  .stats b { color: #94a3b8; }
</style>
</head>
<body>
<div class="card">
  <h1>🚛 Vehicle DB Import</h1>
  <p>This will load <strong>104 vehicles</strong> across 19 makes into the DFR Vehicle Database. Existing entries will be preserved — only new entries are added.</p>
  <button id="importBtn" onclick="doImport()">Import Vehicle DB →</button>
  <button class="green" onclick="window.location.href='data-entry.html'">← Back to Data Entry</button>
  <div class="status" id="status"></div>
  <div class="stats" id="stats" style="display:none;"></div>
</div>

<script>
function waitFor(fn){ return new Promise(r=>{ const t=setInterval(()=>{ if(fn()){ clearInterval(t); r(); } },60); }); }

async function doImport(){
  const btn = document.getElementById('importBtn');
  const st  = document.getElementById('status');
  btn.disabled = true;
  st.className = 'status';
  st.textContent = 'Connecting…';

  await waitFor(()=>typeof cloudStorage !== 'undefined');
  st.textContent = 'Loading existing DB…';

  try {
    const existing = await cloudStorage.getItem('VEHICLE_DB');
    const vdb = existing ? JSON.parse(existing) : {};
    const before = Object.keys(vdb).length;

    const newData = SEED_DATA;
    let added = 0;
    for(const [k,v] of Object.entries(newData)){
      if(!vdb[k]){ vdb[k]=v; added++; }
    }

    await cloudStorage.setItem('VEHICLE_DB', JSON.stringify(vdb));
    const after = Object.keys(vdb).length;

    st.className = 'status ok';
    st.textContent = `✓ Done! ${added} new entries added. Total: ${after} vehicles.`;

    const makes = [...new Set(Object.values(vdb).map(v=>v.make))].sort();
    document.getElementById('stats').style.display = 'block';
    document.getElementById('stats').innerHTML =
      `<b>Total entries:</b> ${after}<br>` +
      `<b>New entries added:</b> ${added}<br>` +
      `<b>Previously existed:</b> ${before}<br>` +
      `<b>Makes covered:</b> ${makes.join(', ')}`;

  } catch(e){
    st.className = 'status err';
    st.textContent = 'Error: ' + e.message;
    btn.disabled = false;
  }
}
</script>
